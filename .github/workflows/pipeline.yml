name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SKIP_ENV_VALIDATION: "true"
  NEXT_PUBLIC_BASE_URL: ""
  # TODO do we need to add this to the next build (.env.local)
  SENTRY_LOG_LEVEL: "debug"

jobs:
  # Disabled because it broke, and no idea why.
  #changed-packages:
  #  name: Determine which apps changed
  #  uses: ./.github/workflows/changed-packages.yml

  lint-admin-ui:
    name: Lint admin ui
    runs-on: ubuntu-latest
    #needs: [changed-packages]
    # if: needs.changed-packages.outputs.admin_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Lint admin ui
        run: |
          pnpm tsc:check --filter=admin-ui...
          pnpm lint --filter=admin-ui...
          pnpm lint:css --filter=admin-ui...


  build-admin-ui:
    name: Build admin ui
    runs-on: ubuntu-latest
    #needs: [changed-packages]
    # if: needs.changed-packages.outputs.admin_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Build ui
        run: pnpm build --filter admin-ui...
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  test-admin-ui:
    name: Test admin ui
    runs-on: ubuntu-latest
    # needs: [changed-packages]
    # if: needs.changed-packages.outputs.admin_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Test admin ui
        run: pnpm test --filter=admin-ui...

  lint-ui:
    name: Lint ui
    runs-on: ubuntu-latest
    # needs: [changed-packages]
    # if: needs.changed-packages.outputs.ui_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Lint ui
        run: |
          pnpm tsc:check --filter=ui...
          pnpm lint --filter=ui...
          pnpm lint:css --filter=ui...

  build-ui:
    name: Build ui
    runs-on: ubuntu-latest
    # needs: [changed-packages]
    # if: needs.changed-packages.outputs.ui_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # FIXME enable cache after we are done with the source maps
      #- uses: dtinth/setup-github-actions-caching-for-turbo@v1
      # FIXME sourcemap upload fails with 413 Request Entity Too Large
      # have to copy the build envs to file otherwise nextjs can't find them
      # TODO make the app base path configurable `apps/ui` (from monorepo root)
      - name: Build ui
        run: |
          touch apps/ui/.env.local
          echo SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} >> apps/ui/.env.local
          echo SENTRY_LOG_LEVEL=debug >> apps/ui/.env.local
          pnpm build --filter ui...
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  test-ui:
    name: Unit tests ui
    runs-on: ubuntu-latest
    # needs: [changed-packages]
    # if: needs.changed-packages.outputs.ui_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Test ui
        run: pnpm test --filter=ui...
